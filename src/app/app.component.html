<div class="app-outlet">
  @if (m_oConstantsService.getUser().userId) {
    <app-header></app-header>
  }
  <div class="d-flex flex-row">
    @if (m_oConstantsService.getUser().userId) {
      <app-navbar></app-navbar>
    }
    <router-outlet></router-outlet>
  </div>
  @if (m_sLocation === 'edit' || m_sLocation=== 'plan' || m_sLocation === 'search') {
    <div>
      <app-processes-bar [m_bIsOpen]="false" [m_oActiveWorkspace]="m_oActiveWorkspace"></app-processes-bar>
    </div>
  }
</div>
