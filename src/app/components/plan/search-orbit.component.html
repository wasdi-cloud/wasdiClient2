<main class="d-flex flex-row flex-fill">

  @if (m_aoSatelliteResources && m_bShowSatelliteFilters === true) {
    <app-search-orbit-resources
      [m_aoSatelliteResources]="m_aoSatelliteResources" [m_oSelectedArea]="m_oGeoJSON" [m_aoSelectedNodes]="m_aoSelectedSatellites" (m_oDateSelection)="getSelectedDates($event)"
      (m_oSatelliteSelection)="getSelectedSatelliteResources($event)"
    (m_oExecuteSearch)="handleExecuteSearch($event)"></app-search-orbit-resources>
  }
  @if (m_bShowSatelliteFilters === false) {
    <app-search-orbit-results [m_aoSearchOrbits]="m_aoOrbitResults"
    (m_oBackToFiltersEmit)="getNavigationStatus($event)"></app-search-orbit-results>
  }
  <div class="map map-container flex-fill">
    <app-plan-map (m_oSearchInputChange)="getBoundingBox($event)"></app-plan-map>
  </div>
