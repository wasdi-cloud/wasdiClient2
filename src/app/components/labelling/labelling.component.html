<main class="d-flex">
  <app-labelling-menu [m_sActiveTab]="m_sActiveTab" (m_sSelectedTab)="getActiveTab($event)" (publishBandMessage)="onPublishBandMessage($event)"></app-labelling-menu>

  <div class="dashboard-content flex-fill"
       [class.dashboard-content--fullscreen]="m_sActiveTab === 'labels'">
    <div class="dashboard-content-wrapper"
         [class.dashboard-content-wrapper--fullscreen]="m_sActiveTab === 'labels'">

      @if (m_sActiveTab === 'projects') {
        <app-labelling-projects (m_oTabChange)="getActiveTab($event)"></app-labelling-projects>
      }
      @if (m_sActiveTab === 'create-project') {
        <app-create-labelling-project (m_oTabChange)="getActiveTab($event)"></app-create-labelling-project>
      }
      @if (m_sActiveTab === 'templates') {
        <app-labelling-templates (m_oTabChange)="getActiveTab($event)"></app-labelling-templates>
      }
      @if (m_sActiveTab === 'create-template') {
        <app-create-template-label (m_oTabChange)="getActiveTab($event)"></app-create-template-label>
      }
      @if (m_sActiveTab === 'labels') {
        <app-labelling-labels (m_oTabChange)="getActiveTab($event)" [publishBandMessage]="m_oPublishBandMessage"></app-labelling-labels>
      }
      @if (m_sActiveTab === 'export') {
        <app-labelling-export (m_oTabChange)="getActiveTab($event)"></app-labelling-export>
      }

    </div>
  </div>
</main>
